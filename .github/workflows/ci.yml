name: CI

on:
  push:
    branches-ignore:
      - "main"
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx @biomejs/biome ci .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Start dev server and run tests
        run: |
          npm run dev:test &
          SERVER_PID=$!
          SERVER_READY=false
          for i in $(seq 1 30); do
            if curl -s http://localhost:8788 > /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              SERVER_READY=true
              break
            fi
            sleep 1
          done
          if [ "$SERVER_READY" = false ]; then
            echo "Server failed to start within 30s"
            kill $SERVER_PID 2>/dev/null || true
            exit 1
          fi
          mkdir -p coverage
          npm test -- --experimental-test-coverage 2>&1 | tee coverage/test-output.log || EXIT_CODE=$?
          kill $SERVER_PID 2>/dev/null || true
          exit ${EXIT_CODE:-0}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run build
