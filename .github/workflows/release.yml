name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  # onnxruntime-node binary download fails in CI; we only use the web build
  ONNXRUNTIME_NODE_DISABLE_DOWNLOAD: 1

jobs:
  check-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Wait for CI and check status
        uses: actions/github-script@v7
        with:
          script: |
            const MAX_ATTEMPTS = 30;
            const POLL_SECONDS = 20;
            for (let attempt = 1; attempt <= MAX_ATTEMPTS; attempt++) {
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci.yml',
                commit_sha: context.sha,
                event: 'push',
                per_page: 1,
              });
              const lastRun = runs.workflow_runs[0];
              if (!lastRun) {
                if (attempt < MAX_ATTEMPTS) {
                  console.log(`Attempt ${attempt}/${MAX_ATTEMPTS}: CI run not yet created, waiting ${POLL_SECONDS}s...`);
                  await new Promise(r => setTimeout(r, POLL_SECONDS * 1000));
                  continue;
                }
                core.setFailed(`No CI workflow run found for commit ${context.sha} after ${MAX_ATTEMPTS * POLL_SECONDS}s.`);
                return;
              }
              if (lastRun.conclusion === null) {
                if (attempt < MAX_ATTEMPTS) {
                  console.log(`Attempt ${attempt}/${MAX_ATTEMPTS}: CI still running (${lastRun.status}), waiting ${POLL_SECONDS}s...`);
                  await new Promise(r => setTimeout(r, POLL_SECONDS * 1000));
                  continue;
                }
                core.setFailed(`CI did not complete in time for commit ${context.sha}. See: ${lastRun.html_url}`);
                return;
              }
              if (lastRun.conclusion === 'success') {
                console.log(`CI passed: ${lastRun.html_url}`);
                return;
              }
              core.setFailed(`CI workflow did not pass for commit ${context.sha}. Status: ${lastRun.conclusion}. See: ${lastRun.html_url}`);
              return;
            }

  create-release:
    runs-on: ubuntu-latest
    needs: check-ci
    outputs:
      upload_url: ${{ steps.create-release.outputs.upload_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true

  tauri-linux:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run tauri:build
        env:
          TAURI_TARGET_PLATFORM: linux
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

  tauri-windows:
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci --ignore-scripts
      - run: npm run build
      - run: npm run tauri:build
        env:
          TAURI_TARGET_PLATFORM: windows
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: src-tauri/target/release/bundle/msi/*.msi

  android:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Install Android SDK components
        run: |
          yes | ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" "build-tools;36.0.0" \
            --sdk_root=${ANDROID_SDK_ROOT}
      - run: npm ci
        env:
          HUSKY: 0
      - run: npm run build
      - run: npx cap add android
      - run: npx cap sync
      - name: Decode google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' | base64 -d > android/app/google-services.json
      - name: Setup signing and build
        env:
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/android/app/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo '${{ secrets.ANDROID_KEYSTORE }}' | base64 -d > "$ANDROID_KEYSTORE_FILE"
          node scripts/patch-android-build.mjs
          cd android && ./gradlew assembleRelease
      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: android/app/build/outputs/apk/release/*.apk

  deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run build
      - name: Deploy DO Worker (NotificationStream)
        run: npx wrangler deploy --config do-worker/wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Sandbox Worker
        run: npx wrangler deploy src/sandbox-worker.ts --config wrangler.sandbox.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy Queue Worker
        run: npx wrangler deploy functions/queue-worker.ts --name flaxia-backend --config wrangler.toml.worker --compatibility-date 2026-06-02
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
