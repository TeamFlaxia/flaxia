version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
      tauri:
        patterns:
          - "@tauri-apps/*"
      hono:
        patterns:
          - "hono"
          - "@hono/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
