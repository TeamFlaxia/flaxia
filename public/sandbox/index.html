<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flaxia Sandbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    #container { width: 100%; height: 100%; }
    #loading { display: flex; align-items: center; justify-content: center; height: 100%; font-family: system-ui, sans-serif; color: #666; }
    #error { display: none; padding: 20px; color: #c00; text-align: center; font-family: system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="container">
    <div id="loading">Loading sandbox...</div>
    <div id="error"></div>
  </div>
  <script type="module">
    const container = document.getElementById('container');
    const loading = document.getElementById('loading');
    const errorEl = document.getElementById('error');

    // Get postId from URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const postId = urlParams.get('postId');
    
    if (postId) {
      console.log('Found postId in URL:', postId);
      // Auto-execute ZIP when page loads
      window.addEventListener('DOMContentLoaded', async () => {
        try {
          console.log('Auto-executing ZIP for postId:', postId);
          const response = await fetch(`/api/zip/${postId}`);
          if (!response.ok) {
            throw new Error('Failed to fetch ZIP');
          }
          const zipData = await response.arrayBuffer();
          
          const result = await executeZip(zipData);
          
          window.parent.postMessage({
            type: 'ZIP_READY',
            postId: postId
          }, '*');
          
          window.zipCleanup = () => {
            result.blobUrlMap.forEach(url => void URL.revokeObjectURL(url));
            URL.revokeObjectURL(result.htmlBlobUrl);
          };
        } catch (err) {
          console.error('Auto-execution error:', err);
          showError(err.message);
          window.parent.postMessage({
            type: 'ZIP_ERROR',
            postId: postId,
            error: err.message
          }, '*');
        }
      });
    } else {
      console.error('No postId found in URL parameters');
    }

    const ALLOWED_EXTENSIONS = {
      '.html': 'text/html',
      '.css': 'text/css',
      '.js': 'text/javascript',
      '.wasm': 'application/wasm',
      '.png': 'image/png',
      '.jpg': 'image/jpeg',
      '.jpeg': 'image/jpeg',
      '.gif': 'image/gif',
      '.webp': 'image/webp',
      '.svg': 'image/svg+xml',
      '.mp3': 'audio/mpeg',
      '.wav': 'audio/wav',
      '.ogg': 'audio/ogg',
      '.mp4': 'video/mp4',
      '.webm': 'video/webm',
      '.json': 'application/json',
      '.txt': 'text/plain',
      '.glsl': 'text/plain',
      '.wgsl': 'text/plain'
    };

    function showError(msg) {
      loading.style.display = 'none';
      errorEl.textContent = msg;
      errorEl.style.display = 'block';
    }

    function shouldRewritePath(path) {
      return !path.startsWith('https://') &&
             !path.startsWith('http://') &&
             !path.startsWith('data:') &&
             !path.startsWith('blob:');
    }

    function rewriteCssUrls(cssText, blobUrlMap) {
      return cssText.replace(/url\s*\(\s*['"]?([^'")\s]+)['"]?\s*\)/g, (match, path) => {
        if (shouldRewritePath(path)) {
          const normalizedPath = path.replace(/^\.\//, '');
          const blobUrl = blobUrlMap.get(normalizedPath);
          if (blobUrl) {
            return `url("${blobUrl}")`;
          }
        }
        return match;
      });
    }

    function rewriteHtmlString(htmlContent, blobUrlMap) {
      htmlContent = htmlContent.replace(/<(?!script)([^>]+)\s+src\s*=\s*['"]([^'"]+)['"]/gi, (match, tagAttrs, src) => {
        if (shouldRewritePath(src)) {
          const normalizedPath = src.replace(/^\.\//, '');
          const blobUrl = blobUrlMap.get(normalizedPath);
          if (blobUrl) {
            return `<${tagAttrs} src="${blobUrl}"`;
          }
        }
        return match;
      });

      htmlContent = htmlContent.replace(/<([^>]+)\s+href\s*=\s*['"]([^'"]+)['"]/gi, (match, tagAttrs, href) => {
        if (shouldRewritePath(href)) {
          const normalizedPath = href.replace(/^\.\//, '');
          const blobUrl = blobUrlMap.get(normalizedPath);
          if (blobUrl) {
            return `<${tagAttrs} href="${blobUrl}"`;
          }
        }
        return match;
      });

      htmlContent = htmlContent.replace(/<style[^>]*>([\s\S]*?)<\/style>/gi, (match, cssContent) => {
        const rewrittenCss = rewriteCssUrls(cssContent, blobUrlMap);
        return match.replace(cssContent, rewrittenCss);
      });

      htmlContent = htmlContent.replace(/style\s*=\s*['"]([^'"]+)['"]/gi, (match, styleContent) => {
        const rewrittenStyle = rewriteCssUrls(styleContent, blobUrlMap);
        return `style="${rewrittenStyle}"`;
      });

      return htmlContent;
    }

    function validateZip(zip) {
      const files = Object.entries(zip.files);

      if (files.length > 255) {
        throw new Error('Too many files (max 255)');
      }

      let totalSize = 0;
      let hasIndexHtml = false;

      for (const [path, file] of files) {
        if (file.dir) continue;

        if (path.length > 255) {
          throw new Error(`Path too long: ${path}`);
        }

        const depth = (path.match(/\//g) || []).length;
        if (depth > 10) {
          throw new Error(`Directory too deep: ${path}`);
        }

        const fileSize = file._data?.uncompressedSize || 0;
        totalSize += fileSize;
        if (totalSize > 100 * 1024 * 1024) {
          throw new Error('Extracted size too large (max 100MB)');
        }

        if (path.toLowerCase().endsWith('.zip')) {
          throw new Error('Nested ZIP files are not allowed');
        }

        const unixPermissions = file.unixPermissions;
        if (unixPermissions && (unixPermissions & 0xF000) === 0xA000) {
          throw new Error('Symbolic links are not allowed');
        }

        if (path.includes('../')) {
          throw new Error(`Path traversal detected: ${path}`);
        }

        if (path.startsWith('/')) {
          throw new Error(`Absolute paths are not allowed: ${path}`);
        }

        if (path === 'index.html') {
          hasIndexHtml = true;
        }

        const ext = path.substring(path.lastIndexOf('.')).toLowerCase();
        if (!ALLOWED_EXTENSIONS[ext]) {
          throw new Error(`File type not allowed: ${path}`);
        }
      }

      if (!hasIndexHtml) {
        throw new Error('index.html not found at root');
      }
    }

    async function generateBlobUrlMap(zip) {
      const blobUrlMap = new Map();

      for (const [path, file] of Object.entries(zip.files)) {
        if (file.dir) continue;

        const normalizedPath = path.replace(/^\.\//, '');
        const ext = path.substring(path.lastIndexOf('.')).toLowerCase();
        const mimeType = ALLOWED_EXTENSIONS[ext];

        if (mimeType) {
          const content = await file.async('uint8array');
          const arrayBuffer = content.buffer.slice(content.byteOffset, content.byteOffset + content.byteLength);
          const blob = new Blob([arrayBuffer], { type: mimeType });
          const blobUrl = URL.createObjectURL(blob);
          blobUrlMap.set(normalizedPath, blobUrl);
        }
      }

      return blobUrlMap;
    }

    async function loadJSZip() {
      if (!window.JSZip) {
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/jszip@3.10.1/dist/jszip.min.js';
        script.crossOrigin = 'anonymous';
        script.onerror = () => showError('Failed to load JSZip');
        document.head.appendChild(script);
        await new Promise((resolve, reject) => {
          script.onload = resolve;
          script.onerror = reject;
        });
      }
      return window.JSZip;
    }

    async function executeZip(zipData) {
      const JSZip = await loadJSZip();
      const zip = await JSZip.loadAsync(zipData);
      validateZip(zip);
      const blobUrlMap = await generateBlobUrlMap(zip);

      const indexFile = zip.files['index.html'];
      if (!indexFile || indexFile.dir) {
        throw new Error('index.html not found at root');
      }

      let htmlContent = await indexFile.async('string');
      htmlContent = rewriteHtmlString(htmlContent, blobUrlMap);

      const htmlBlob = new Blob([htmlContent], { type: 'text/html' });
      const htmlBlobUrl = URL.createObjectURL(htmlBlob);

      const iframe = document.createElement('iframe');
      iframe.src = htmlBlobUrl;
      iframe.sandbox = 'allow-scripts allow-pointer-lock allow-fullscreen';
      iframe.setAttribute('allow', 'fullscreen');
      iframe.setAttribute('referrerpolicy', 'no-referrer');
      iframe.style.cssText = `
        width: 100%;
        height: 100%;
        border: none;
        background: white;
      `;

      container.innerHTML = '';
      container.appendChild(iframe);

      return { iframe, blobUrlMap, htmlBlobUrl };
    }

    window.addEventListener('message', async (event) => {
      if (event.data?.type === 'EXECUTE_ZIP') {
        loading.style.display = 'flex';
        errorEl.style.display = 'none';

        try {
          const zipData = event.data.zipData;
          if (!zipData) {
            throw new Error('No ZIP data received');
          }

          const result = await executeZip(zipData);

          window.parent.postMessage({
            type: 'ZIP_READY',
            postId: event.data.postId
          }, event.data.origin || '*');

          window.zipCleanup = () => {
            result.blobUrlMap.forEach(url => void URL.revokeObjectURL(url));
            URL.revokeObjectURL(result.htmlBlobUrl);
          };
        } catch (err) {
          showError(err.message);
          window.parent.postMessage({
            type: 'ZIP_ERROR',
            postId: event.data?.postId,
            error: err.message
          }, event.data?.origin || '*');
        }
      }
    });

    window.addEventListener('message', (event) => {
      if (event.data?.type === 'REQUEST_FULLSCREEN') {
        const iframe = container.querySelector('iframe');
        if (iframe?.requestFullscreen) {
          iframe.requestFullscreen().catch(() => {});
        }
      }
    });

    window.addEventListener('unload', () => {
      if (window.zipCleanup) {
        window.zipCleanup();
      }
    });
  </script>
</body>
</html>
