name = "flaxia"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "dist"

[[durable_objects.bindings]]
name = "NOTIFICATION_STREAM"
class_name = "NotificationStream"
script_name = "notif-stream"

[[d1_databases]]
binding = "DB"
database_name = "flaxia"
database_id = "7c99f35f-69a0-4644-96a1-34c716a3e82d"

[vars]
SANDBOX_ORIGIN = "https://flaxia.app"
BASE_URL = "https://flaxia.app"
CROWD_ORCHESTRATOR_URL = "https://flaxia-worker.remydre8.workers.dev"
CROWD_API_KEY = "fc_live_flaxia_dev_key"

# To set ADMIN_USERNAMES secret for admin features:
# npx wrangler secret put ADMIN_USERNAMES
# Enter comma-separated usernames (e.g., "admin,moderator")

ADMIN_USERNAMES = "remydrescarlet"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "flaxia-content"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "96ea8717c5cf419ab93640bbaa2b93c2"

[[queues.producers]]
queue = "activitypub-delivery"
binding = "AP_DELIVERY_QUEUE"

# Flaxia Crowd 分散コンピューティング
# CROWD_API_KEY は本番環境では secret 推奨:
#   npx wrangler secret put CROWD_API_KEY

# FCM (Firebase Cloud Messaging) — Capacitor モバイルアプリ向けプッシュ通知
# Firebase Console → プロジェクトの設定 → サービスアカウント → 新しい秘密鍵を生成
# ダウンロードされた JSON ファイルの内容全体を secret に設定:
#   npx wrangler secret put FCM_SERVER_KEY
# またはローカル開発用に .dev.vars に保存:
#   echo "FCM_SERVER_KEY=$(cat service-account.json)" > .dev.vars

# Web Push (VAPID)
# 本番環境では下記の secret を設定:
#   npx wrangler secret put VAPID_PUBLIC_KEY
#   npx wrangler secret put VAPID_PRIVATE_KEY
# 開発環境では自動生成される（毎回変わるので通知が切れる可能性あり）