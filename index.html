<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flaxia</title>
  <meta name="description" content="The SNS where your posts are playable.">
  <meta property="og:title" content="Flaxia">
  <meta property="og:description" content="The SNS where your posts are playable.">
  <meta name="twitter:title" content="Flaxia">
  <meta name="twitter:description" content="The SNS where your posts are playable.">
  
  <!-- Performance optimizations -->
  <link rel="preload" href="/src/styles/main.css" as="style">
  <link rel="preconnect" href="https://flaxia.app">
  <link rel="dns-prefetch" href="/api">
  
  <!-- Noto Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Critical CSS inline -->
  <style>
    /* Prevent flash of unstyled content */
    body { 
      margin: 0; 
      padding: 0; 
      font-family: 'Noto Sans', monospace, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #ffffff;
      color: #0f172a;
      line-height: 1.6;
    }
    #app { 
      display: flex; 
      min-height: 100vh; 
      margin: 0; 
      padding: 0; 
    }
    /* Loading skeleton for initial page load */
    .initial-loader {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .initial-loader-content {
      text-align: center;
      color: #64748b;
      font-family: monospace;
    }
    .initial-loader-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top: 3px solid #22c55e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
  
  <link rel="stylesheet" href="/src/styles/main.css">
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const langParam = urlParams.get('lang');
      const userLang = langParam || navigator.language || navigator.userLanguage || 'en';
      const isJapanese = userLang.startsWith('ja');
      
      const metaTags = {
        title: isJapanese ? 'Flaxia' : 'Flaxia',
        description: isJapanese ? 'ゲームやアプリをそのまま投稿できるSNS' : 'The SNS where your posts are playable.',
        ogTitle: isJapanese ? 'Flaxia' : 'Flaxia',
        ogDescription: isJapanese ? 'ゲームやアプリをそのまま投稿できるSNS' : 'The SNS where your posts are playable.',
        twitterTitle: isJapanese ? 'Flaxia' : 'Flaxia',
        twitterDescription: isJapanese ? 'ゲームやアプリをそのまま投稿できるSNS' : 'The SNS where your posts are playable.'
      };
      
      document.title = metaTags.title;
      document.querySelector('meta[name="description"]').setAttribute('content', metaTags.description);
      document.querySelector('meta[property="og:title"]').setAttribute('content', metaTags.ogTitle);
      document.querySelector('meta[property="og:description"]').setAttribute('content', metaTags.ogDescription);
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', metaTags.twitterTitle);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', metaTags.twitterDescription);
      
      document.documentElement.lang = isJapanese ? 'ja' : 'en';
    })();
  </script>

  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-JZWZ08QFCW"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        
        gtag('config', 'G-JZWZ08QFCW');
    </script>
</head>
<body>
  <!-- Initial loading indicator -->
  <div class="initial-loader" id="initial-loader">
    <div class="initial-loader-content">
      <div class="initial-loader-spinner"></div>
      <div>Loading Flaxia...</div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>

  <script>
    // Hide initial loader when app is ready
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(() => loader.remove(), 300);
        }
      }, 100);
    });
  </script>
