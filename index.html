<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flaxia</title>
  <meta name="description" content="The SNS where your posts are playable.">
  <meta property="og:title" content="Flaxia">
  <meta property="og:description" content="The SNS where your posts are playable.">
  <meta name="twitter:title" content="Flaxia">
  <meta name="twitter:description" content="The SNS where your posts are playable.">
  
  <link rel="preconnect" href="https://flaxia.app">
  <link rel="dns-prefetch" href="/api">
  
  <!-- Noto Sans Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all';this.onload=null">

  <meta name="google-adsense-account" content="ca-pub-8703789531673358">
  
  <!-- Critical CSS inline -->
  <style>
    :root {
      --bg-primary:    #ffffff;
      --bg-secondary:  #f0fdf4;
      --bg-input:      #f1f5f9;
      --border:        #e2e8f0;
      --text-primary:  #0f172a;
      --text-muted:    #64748b;
      --accent:        #22c55e;
      --accent-dark:   #16a34a;
      --danger:        #ef4444;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans', monospace, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.6;
    }
    #app {
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      padding: 0;
    }
    .initial-loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .initial-loader-content {
      text-align: center;
      color: var(--text-muted);
      font-family: monospace;
    }
    .initial-loader-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    .page-loader {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999;
      opacity: 0; transition: opacity 0.15s ease;
      pointer-events: none;
    }
    .page-loader.active {
      opacity: 1;
      pointer-events: auto;
    }
    .page-loader-content {
      text-align: center;
      color: var(--text-muted);
      font-family: monospace;
    }
    .page-loader-spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .main-container {
      display: flex;
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
    }
    .left-nav {
      width: 240px; flex-shrink: 0; padding: 1rem;
      border-right: 1px solid var(--border); background: white;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .main-content {
      flex: 1; max-width: 600px; padding: 1rem;
      border-right: 1px solid var(--border);
    }
    .right-panel {
      width: 350px; flex-shrink: 0; padding: 1rem;
      position: sticky; top: 0; height: 100vh; overflow-y: auto;
    }
    .left-nav-open-button {
      position: fixed; left: 0; top: 50%; transform: translateY(-50%);
      width: 24px; height: 88px; font-size: 1.35rem; font-weight: bold;
      color: #fff; background: rgba(34,197,94,0.25);
      border: none; border-radius: 0 14px 14px 0; z-index: 1080;
      cursor: pointer; transition: background .2s, transform .2s; display: none;
    }
    .left-nav-open-button:hover { background: rgba(34,197,94,0.45); }
    .nav-logo { margin-bottom: 2rem; }
    .nav-items {
      display: flex; flex-direction: column; gap: .25rem; margin-bottom: 2rem;
    }
    .nav-item {
      display: flex; align-items: center; padding: .75rem 1rem;
      background: transparent; border: none; border-radius: 9999px;
      color: var(--text-primary); cursor: pointer;
      font-family: 'Noto Sans', monospace; font-size: 1rem; font-weight: 400;
      transition: all .2s; text-align: left; width: 100%;
    }
    .nav-item:hover { background: var(--bg-secondary); }
    .nav-item--active { color: var(--accent); font-weight: 600; }
    .nav-post-button {
      width: 100%; padding: .75rem 1rem; background: var(--accent);
      color: #000; border: none; border-radius: 9999px;
      font-family: 'Noto Sans', monospace; font-size: 1rem; font-weight: bold;
      cursor: pointer; transition: background-color .2s;
    }
    .nav-post-button:hover { background: var(--accent-dark); }
    .search-section { margin-bottom: 1.5rem; }
    .search-box { position: relative; margin-bottom: 1rem; }
    .search-input {
      width: 100%; padding: .75rem 1rem .75rem 2.5rem;
      background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 9999px; color: var(--text-primary);
      font-family: 'Noto Sans', monospace; font-size: .875rem;
      outline: none; transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute; left: .75rem; top: 50%; transform: translateY(-50%);
      color: var(--text-muted); font-size: .875rem;
    }
    .trending-section, .follow-section, .ad-section { margin-bottom: 1.5rem; }
    .section-title {
      font-size: 1.125rem; font-weight: 600; color: var(--text-primary);
      margin-bottom: .75rem; padding: 0 .5rem;
    }
    @media (max-width: 1024px) {
      .right-panel { display: none; }
      .main-container { max-width: 840px; }
    }
    @media (max-width: 768px) {
      .left-nav {
        position: fixed; top: 0; left: 0; width: 280px; height: 100vh;
        border-right: 1px solid var(--border); border-top: none;
        padding: 1rem; z-index: 1100; transform: translateX(-100%);
        transition: transform .3s; background: var(--bg-primary);
        overflow-y: auto; -webkit-overflow-scrolling: touch;
      }
      .left-nav--open { transform: translateX(0); box-shadow: 4px 0 12px rgba(0,0,0,0.15); }
      .left-nav-overlay {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.5); z-index: 1099;
        opacity: 0; visibility: hidden; transition: opacity .3s, visibility .3s;
      }
      .left-nav-overlay--visible { opacity: 1; visibility: visible; }
      .left-nav-open-button { display: block; }
      .main-content { padding-bottom: 1rem; }
      .main-container { flex-direction: column; }
    }
  </style>
  
  <link rel="stylesheet" href="/src/styles/main.css" media="print" onload="this.media='all';this.onload=null">
  <script>
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const langParam = urlParams.get('lang');
      const userLang = langParam || navigator.language || navigator.userLanguage || 'en';
      const isJapanese = userLang.startsWith('ja');
      
      const metaTags = {
        title: isJapanese ? 'Flaxia' : 'Flaxia',
        description: isJapanese ? 'ゲームやアプリをそのまま投稿できるSNS' : 'The SNS where your posts are playable.',
        ogTitle: isJapanese ? 'Flaxia' : 'Flaxia',
        ogDescription: isJapanese ? 'ゲームやアプリをそのまま投稿できるSNS' : 'The SNS where your posts are playable.',
        twitterTitle: isJapanese ? 'Flaxia' : 'Flaxia',
        twitterDescription: isJapanese ? 'ゲームやアプリをそのまま投稿できるSNS' : 'The SNS where your posts are playable.'
      };
      
      document.title = metaTags.title;
      document.querySelector('meta[name="description"]').setAttribute('content', metaTags.description);
      document.querySelector('meta[property="og:title"]').setAttribute('content', metaTags.ogTitle);
      document.querySelector('meta[property="og:description"]').setAttribute('content', metaTags.ogDescription);
      document.querySelector('meta[name="twitter:title"]').setAttribute('content', metaTags.twitterTitle);
      document.querySelector('meta[name="twitter:description"]').setAttribute('content', metaTags.twitterDescription);
      
      document.documentElement.lang = isJapanese ? 'ja' : 'en';
    })();
  </script>

<body>
  <!-- Initial loading indicator -->
  <div class="initial-loader" id="initial-loader">
    <div class="initial-loader-content">
      <div class="initial-loader-spinner"></div>
      <div>Loading Flaxia...</div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>

  <script>
    // Hide initial loader when app is ready
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) {
          loader.style.opacity = '0';
          loader.style.transition = 'opacity 0.3s ease';
          setTimeout(() => loader.remove(), 300);
        }
      }, 100);
    });
  </script>
